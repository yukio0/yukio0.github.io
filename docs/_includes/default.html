<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>

    <link rel="icon" href="{{ '/icons/favicon.ico' | relative_url }}" sizes="any">

    <link rel="icon" type="image/png" href="{{ '/icons/favicon-16x16.png' | relative_url }}" sizes="16x16">
    <link rel="icon" type="image/png" href="{{ '/icons/favicon-32x32.png' | relative_url }}" sizes="32x32">
    <link rel="icon" type="image/png" href="{{ '/icons/favicon-48x48.png' | relative_url }}" sizes="48x48">
    <link rel="icon" type="image/png" href="{{ '/icons/favicon-96x96.png' | relative_url }}" sizes="96x96">

    <link rel="apple-touch-icon" href="{{ '/icons/apple-touch-icon.png' | relative_url }}" sizes="180x180">

    <link rel="manifest" href="{{ '/icons/site.webmanifest' | relative_url }}">

    <meta name="msapplication-config" content="{{ '/icons/browserconfig.xml' | relative_url }}">
    <meta name="msapplication-TileImage" content="{{ '/icons/mstile-150x150.png' | relative_url }}">
</head>

<body>
    {{ content }}
</body>

</html>
